<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PixelVault - Aplikasi Web untuk Kompresi Huffman/DCT dan LSB Steganografi Gambar, Audio, dan Video." />
    <title>PixelVault - Codec & Steganografi</title>
    <script>
      window.addEventListener('error', function(e) {
        var div = document.getElementById('error-overlay') || document.createElement('div');
        div.id = 'error-overlay';
        div.style.color = 'red';
        div.style.padding = '20px';
        div.style.background = '#fee2e2';
        div.style.border = '2px solid #ef4444';
        div.style.margin = '20px';
        div.style.borderRadius = '8px';
        div.style.fontFamily = 'monospace';
        div.style.position = 'relative';
        div.style.zIndex = '9999';
        div.innerHTML = '<h3>React Load Error:</h3><pre>' + e.message + '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno + '</pre>';
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var div = document.getElementById('error-overlay') || document.createElement('div');
        div.id = 'error-overlay';
        div.style.color = 'red';
        div.style.padding = '20px';
        div.style.background = '#fee2e2';
        div.style.border = '2px solid #ef4444';
        div.style.margin = '20px';
        div.style.borderRadius = '8px';
        div.style.fontFamily = 'monospace';
        div.style.position = 'relative';
        div.style.zIndex = '9999';
        div.innerHTML = '<h3>Unhandled Promise Rejection:</h3><pre>' + (e.reason ? e.reason.stack || e.reason : e) + '</pre>';
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
